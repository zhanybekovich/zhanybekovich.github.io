<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoctorCare</title>
    <link rel="stylesheet" href="assets/css/main.min.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <nav class="header-nav">
          <a href="#" class="header-logo">
            <img
              class="logo-img-static"
              src="assets/images/logo.svg"
              alt="Logo"
            />
          </a>

          <button class="header-menu-toggle">
            <span class="visually-hidden">Toggle Menu</span>
          </button>

          <div class="header-collapse">
            <ul class="header-menu">
              <li class="header-menu-item">
                <a class="header-menu-link" href="#">Home</a>
              </li>
              <li class="header-menu-item">
                <a class="header-menu-link" href="#">About us</a>
              </li>
              <li class="header-menu-item">
                <a class="header-menu-link" href="#">Services</a>
              </li>
              <li class="header-menu-item">
                <a class="header-menu-link" href="#">Blog</a>
              </li>
            </ul>

            <a href="#" class="btn header-cta">Schedule appointment</a>

            <ul class="socials header-socials">
              <li class="socials-item">
                <a class="socials-link" href="#">
                  <img
                    class="socials-icon"
                    src="assets/images/instagram.svg"
                    alt="Instagram"
                  />
                </a>
              </li>
              <li class="socials-item">
                <a class="socials-link" href="#">
                  <img
                    class="socials-icon"
                    src="assets/images/facebook.svg"
                    alt="Facebook"
                  />
                </a>
              </li>
              <li class="socials-item">
                <a class="socials-link" href="#">
                  <img
                    class="socials-icon"
                    src="assets/images/youtube.svg"
                    alt="Youtube"
                  />
                </a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>
    <script src="assets/js/main.js"></script>
  </body>
</html>
